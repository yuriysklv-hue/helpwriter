name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/voice_bot

            # Pull latest code from main
            git fetch origin main
            git reset --hard origin/main

            # Update nginx config and reload
            cp nginx.conf /etc/nginx/sites-enabled/helpwriter
            nginx -s reload

            # Rebuild frontend
            cd web
            npm install --legacy-peer-deps
            npm run build
            cd ..

            # Restart bot (create session if missing)
            tmux has-session -t bot 2>/dev/null || tmux new-session -d -s bot
            tmux send-keys -t bot C-c Enter 2>/dev/null || true
            sleep 2
            tmux send-keys -t bot "cd ~/voice_bot && source activate && python bot_v2.py" Enter

            # Restart API (create session if missing)
            tmux has-session -t api 2>/dev/null || tmux new-session -d -s api
            tmux send-keys -t api C-c Enter 2>/dev/null || true
            sleep 1
            tmux send-keys -t api "cd ~/voice_bot && source activate && uvicorn api.main:app --host 0.0.0.0 --port 8000" Enter

            echo "✅ Deploy complete"
