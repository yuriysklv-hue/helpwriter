server {
    listen 80;
    server_name helpwriter.ru www.helpwriter.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name helpwriter.ru www.helpwriter.ru;

    ssl_certificate /etc/letsencrypt/live/helpwriter.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/helpwriter.ru/privkey.pem;

    root /root/voice_bot/voice_assistant_bot/web/dist;
    index index.html;

    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /internal {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
